<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتشف الفيديوهات العشوائي</title>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .player-wrapper { width: 100%; max-width: 800px; aspect-ratio: 16 / 9; background: #000; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        iframe { width: 100%; height: 100%; border: none; }
        .controls { margin-top: 30px; }
        button { background: #e50914; color: white; border: none; padding: 15px 40px; font-size: 18px; border-radius: 50px; cursor: pointer; transition: transform 0.2s; }
        button:hover { transform: scale(1.05); }
        h1 { margin-bottom: 20px; }
    </style>
</head>
<body>

    <h1>استكشف فيديوهات عشوائية</h1>
    
    <div class="player-wrapper">
        <iframe id="video-frame" src="" allowfullscreen></iframe>
    </div>

    <div class="controls">
        <button onclick="loadRandomVideo()">الفيديو التالي ⟳</button>
    </div>

    <script>
        // ضع هنا روابط الـ Embed الخاصة بالفيديوهات
        const videos = [
            'https://www.pornhub.com/embed/6750c6bdb71f3',
            'https://www.pornhub.com/embed/69859bc8700f0',
            'https://www.pornhub.com/embed/6999db80f29c4',
            'https://www.pornhub.com/embed/670cbc6ba9eeb',
        ];

        function loadRandomVideo() {
            const randomIndex = Math.floor(Math.random() * videos.length);
            document.getElementById('video-frame').src = videos[randomIndex];
        }

        // تحميل فيديو عند فتح الموقع
        loadRandomVideo();
    </script>
</body>
</html>
